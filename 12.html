<!DOCTYPE html>
<html>
<head>
<title>Bootstrap Demo</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
<div class="container">
<a class="navbar-brand" href="#">Site</a>
</div>
</nav>

<!-- Carousel -->
<div id="c" class="carousel slide" data-bs-ride="carousel">
<div class="carousel-inner">
<div class="carousel-item active">
<img src="https://via.placeholder.com/800x300" class="d-block w-100">
</div>
<div class="carousel-item">
<img src="https://via.placeholder.com/800x300" class="d-block w-100">
</div>
</div>
</div>

<!-- Grid + Cards -->
<div class="container mt-4">
<div class="row">

<div class="col-md-4">
<div class="card p-2">Card 1 <button class="btn btn-primary mt-2">Click</button></div>
</div>

<div class="col-md-4">
<div class="card p-2">Card 2 <button class="btn btn-success mt-2">Click</button></div>
</div>

<div class="col-md-4">
<div class="card p-2">Card 3 <button class="btn btn-danger mt-2">Click</button></div>
</div>

</div>
</div>

<!-- Buttons -->
<div class="text-center m-3">
<button class="btn btn-primary">Primary</button>
<button class="btn btn-warning">Warning</button>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-2">
Footer Section
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
