<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Iframe Demo</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }
        .container {
            display: flex;
            height: 90vh;
        }
        .left, .right {
            flex: 1;
            border: 1px solid #ccc;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<header>
    <h2>Iframe Demo: Map & External Webpage</h2>
</header>

<div class="container">
    
    <!-- Google Map -->
    <div class="left">
        <iframe 
            src="https://www.google.com/maps?q=Nagpur&output=embed">
        </iframe>
    </div>

    <!-- External Website -->
    <div class="right">
        <iframe 
            src="https://example.com">
        </iframe>
    </div>

</div>

</body>
</html>
