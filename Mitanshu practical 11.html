<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML5 APIs Demo</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }
        #dragBox {
            width: 100px;
            height: 100px;
            background: red;
            color: white;
            line-height: 100px;
            margin: 20px auto;
            cursor: grab;
        }
        #dropArea {
            width: 200px;
            height: 200px;
            border: 2px dashed black;
            margin: 20px auto;
            line-height: 200px;
        }
        button {
            margin: 10px;
            padding: 8px 15px;
        }
    </style>
</head>
<body>

    <h2>HTML5 APIs Demo</h2>

    <!-- Drag and Drop -->
    <h3>Drag and Drop</h3>
    <div id="dragBox" draggable="true">Drag Me</div>
    <div id="dropArea">Drop Here</div>

    <!-- Geolocation -->
    <h3>Geolocation</h3>
    <button onclick="getLocation()">Get Location</button>
    <p id="location"></p>

    <!-- Web Storage -->
    <h3>Web Storage</h3>
    <input type="text" id="nameInput" placeholder="Enter your name">
    <button onclick="saveData()">Save</button>
    <button onclick="loadData()">Load</button>
    <p id="output"></p>

    <script>
        // Drag & Drop
        const dragBox = document.getElementById("dragBox");
        const dropArea = document.getElementById("dropArea");

        dragBox.addEventListener("dragstart", function(e) {
            e.dataTransfer.setData("text", "dragBox");
        });

        dropArea.addEventListener("dragover", function(e) {
            e.preventDefault();
        });

        dropArea.addEventListener("drop", function(e) {
            e.preventDefault();
            const data = e.dataTransfer.getData("text");
            dropArea.appendChild(document.getElementById(data));
        });

        // Geolocation
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(showPosition);
            } else {
                document.getElementById("location").innerText = "Geolocation not supported.";
            }
        }

        function showPosition(position) {
            document.getElementById("location").innerText =
                "Latitude: " + position.coords.latitude +
                ", Longitude: " + position.coords.longitude;
        }

        // Web Storage
        function saveData() {
            let name = document.getElementById("nameInput").value;
            localStorage.setItem("username", name);
            alert("Data Saved!");
        }

        function loadData() {
            let name = localStorage.getItem("username");
            document.getElementById("output").innerText = "Stored Name: " + name;
        }
    </script>

</body>
</html>
