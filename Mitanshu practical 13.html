<!DOCTYPE html>
<html>
<head>
<title>Mini Responsive Site</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container">

<!-- Breadcrumb -->
<nav class="mt-3">
  <ol class="breadcrumb">
    <li class="breadcrumb-item">Home</li>
    <li class="breadcrumb-item active">Dashboard</li>
  </ol>
</nav>

<!-- Dropdown -->
<div class="dropdown mb-3">
  <button class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown">
    Menu
  </button>
  <ul class="dropdown-menu">
    <li><a class="dropdown-item" href="#">Profile</a></li>
    <li><a class="dropdown-item" href="#">Settings</a></li>
  </ul>
</div>

<!-- Responsive Grid -->
<div class="row text-center">
  <div class="col-md-4 col-sm-12 bg-light p-3">Column 1</div>
  <div class="col-md-4 col-sm-12 bg-secondary text-white p-3">Column 2</div>
  <div class="col-md-4 col-sm-12 bg-light p-3">Column 3</div>
</div>

<!-- Form -->
<form class="mt-4">
  <input type="text" class="form-control mb-2" placeholder="Name">
  <input type="email" class="form-control mb-2" placeholder="Email">
  <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#m">
    Submit
  </button>
</form>

<!-- Modal -->
<div class="modal fade" id="m">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Success</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">Form Submitted!</div>
    </div>
  </div>
</div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
